# DataNexus MCP — Smithery registry manifest
# https://smithery.ai

name: datanexus-mcp
displayName: DataNexus MCP
description: >
  55-tool AI-Ready public data intelligence via MCP.
  8 categories: security (CVE, SBOM, licence policy, dependency graph, CVE watch inbox),
  frontend_security (typosquatting top-500, manifest audit, CI pipeline scanner, npm risk brief),
  nonprofit (IRS EO BMF + IRS TEOS + UK Charity Commission),
  compliance (NPPES NPI + FINRA BrokerCheck + SAM.gov),
  domain (IANA RDAP + crt.sh + Cloudflare DoH),
  legal/patents (EPO OPS + USPTO + WIPO),
  govcon (USASpending.gov + SAM.gov),
  regulatory (Regulations.gov + Federal Register).
  Free tier: 10 calls/week anonymous, 100/week with free API key.
  Use search_datanexus_tools first. Token-efficient AI-Ready Markdown.

version: 2.4.0
license: MIT
homepage: https://datanexusmcp.com
repository: https://github.com/datanexusmcp/mcp-server

categories:
  - data
  - research
  - legal
  - finance
  - government
  - security

tags:
  - security
  - cve
  - vulnerability
  - devsecops
  - kev
  - sbom
  - frontend-security
  - ci-pipeline
  - supply-chain
  - typosquatting
  - licence-policy
  - api-key
  - compliance
  - legal
  - patents
  - government-contracts
  - nonprofit
  - EIN
  - IRS
  - charity
  - UK-charity
  - CCEW
  - OSV
  - CycloneDX
  - SPDX
  - dependency-graph
  - NIST-NVD
  - CVSS
  - NPI
  - FINRA
  - SAM
  - RDAP
  - DNS
  - SSL
  - EPO
  - USPTO
  - GovCon
  - USASpending
  - federal-register
  - regulations

runtime: node
nodeVersion: ">=18"

startCommand:
  type: http
  url: https://datanexusmcp.com/mcp

configSchema:
  type: object
  properties:
    apiKey:
      type: string
      title: DataNexus API Key
      description: "Optional. Get a free key at datanexusmcp.com/signup. Unlocks higher limits."
      x-secret: true
  required: []

# Local fallback (bridges HTTP → stdio)
# startCommand:
#   type: stdio
#   command: npx
#   args:
#     - -y
#     - "@datanexusmcp/mcp-server"

environmentVariables:
  DATANEXUS_ENV:
    description: Runtime environment. Set to 'production' on the Hetzner server.
    required: false
    default: development

  DATANEXUS_REDIS_URL:
    description: Redis URL for response caching. Falls back to in-process fakeredis if unavailable.
    required: false
    default: redis://localhost:6379

  DATANEXUS_DB_URL:
    description: PostgreSQL URL for session telemetry. Optional — telemetry skipped if absent.
    required: false

  MCPIZE_ACTIVE:
    description: >
      Master payment enforcement switch. false = free window (all tools pass through).
      true = verify_entitlement enforces subscription checks. Default false.
    required: false
    default: "false"

  FEEDBACK_AGENTS_ACTIVE:
    description: >
      Enable background feedback classification agents. false = agents inactive,
      feedback still recorded. Default false.
    required: false
    default: "false"

  DATANEXUS_UK_CHARITY_KEY:
    description: >
      Charity Commission England and Wales API key.
      Free at register-of-charities.charitycommission.gov.uk/register/api-request.
      Tools degrade gracefully if absent.
    required: false

  PAYMENT_ENABLED:
    description: >
      Controls whether the free-tier monthly call limit is enforced as a hard gate.
      false (default): serve all requests and add usage hints to responses.
      true: return HTTP 429 when anonymous (100/month) or registered (500/month) limit is reached.
      Flip this in Railway env vars when payment processing is enabled — no redeploy needed.
    required: false
    default: "false"

tools:
  # ── Shared ──────────────────────────────────────────────────────────────────
  - name: search_datanexus_tools
    description: >
      Find the right DataNexus tool by describing your task in plain English.
      Use this first. Reduces context load from ~40,000 to ~800 tokens.

  # ── T04 — Nonprofit ─────────────────────────────────────────────────────────
  - name: nonprofit_fetch_nonprofit_by_ein
    description: >
      IRS 990 data for any US nonprofit by EIN. Sources: IRS EO BMF + IRS TEOS.
      Returns org name, address, NTEE code, revenue, assets. AI-Ready Markdown.

  - name: nonprofit_search_nonprofits_by_name
    description: >
      Search US nonprofits by organisation name. Source: IRS EO BMF.
      Returns top 25 matches with EIN, name, state, NTEE code.

  - name: nonprofit_fetch_charity_uk
    description: >
      UK charity data from Charity Commission England and Wales (CCEW).
      Returns registered name, income, expenditure, activities, trustees.
      UK GDPR purpose-limitation applies — data for due-diligence only.

  # ── T10 — Security ──────────────────────────────────────────────────────────
  - name: security_fetch_package_vulnerabilities
    description: >
      All known CVEs for an open-source package + version across PyPI, npm, Maven,
      Go, Cargo, NuGet, RubyGems, Packagist. Sources: Google OSV.dev + NIST NVD.
      Returns CVSS v3 scores, aliases, fixed versions.

  - name: security_fetch_dependency_graph
    description: >
      Transitive dependency graph for a package version. Source: deps.dev (Google).
      Hard 8-second timeout. Never hangs silently.

  - name: security_fetch_cve_detail
    description: >
      Full CVE detail by CVE ID. Source: NIST NVD.
      Returns CVSS v3 base score, vector, CWE, CPEs, patch references.

  - name: security_audit_sbom_vulnerabilities
    description: >
      Audit a CycloneDX or SPDX SBOM against Google OSV.dev.
      Returns per-component vulnerability count and severity. Source: OSV.dev batch API.

  - name: security_fetch_package_licence
    description: >
      SPDX licence identifier for an open-source package version.
      Use before adding a commercial dependency. Source: deps.dev (Google).

  # ── T22 — Compliance ────────────────────────────────────────────────────────
  - name: compliance_fetch_npi_provider
    description: >
      NPI registration for any US healthcare provider. Source: NPPES NPI Registry (CMS).
      Returns name, taxonomy, speciality, address, status.

  - name: compliance_search_npi_by_name
    description: >
      Search NPI registry by provider name with optional state and speciality filters.
      Source: NPPES NPI Registry (CMS).

  - name: compliance_fetch_finra_broker
    description: >
      FINRA BrokerCheck registration by CRD number. Source: FINRA BrokerCheck.
      Returns licences, disclosures, employment history.

  - name: compliance_check_sam_exclusion
    description: >
      Check federal exclusions list by name or EIN. Source: SAM.gov.
      Returns debarred and suspended entities.

  # ── T07 — Domain ────────────────────────────────────────────────────────────
  - name: domain_fetch_domain_rdap
    description: >
      WHOIS-replacement RDAP lookup. Source: IANA RDAP.
      Returns registrar, expiry, nameservers, status flags.

  - name: domain_fetch_ssl_certificate_chain
    description: >
      Certificate Transparency log certificates for a domain. Source: crt.sh.
      Returns issuer, SANs, validity dates.

  - name: domain_fetch_dns_records
    description: >
      A / AAAA / MX / TXT / NS / CNAME records for any domain.
      Source: Cloudflare DoH.

  - name: domain_fetch_domain_history
    description: >
      Historical certificate issuance from CT logs. Source: crt.sh.
      Track domain ownership changes over time.

  # ── T11 — Legal / Patents ───────────────────────────────────────────────────
  - name: legal_fetch_patent_by_number
    description: >
      Full bibliographic data for a patent. Sources: EPO OPS + USPTO.
      Returns title, abstract, inventors, assignee, citations.

  - name: legal_search_patents_by_keyword
    description: >
      Search EP / US / WO patents by keyword and date range.
      Sources: EPO OPS + USPTO.

  - name: legal_fetch_patent_citations
    description: >
      Forward and backward citations for a patent. Source: EPO OPS.
      Returns who cited it and what it cites.

  - name: legal_fetch_inventor_portfolio
    description: >
      Patent portfolio for an inventor, optionally filtered by assignee.
      Source: EPO OPS.

  # ── T18 — GovCon ────────────────────────────────────────────────────────────
  - name: govcon_search_contract_awards
    description: >
      Search federal contract awards by keyword and agency.
      Sources: USASpending.gov + SAM.gov.
      Returns award amounts, vendors, NAICS codes.

  - name: govcon_fetch_vendor_contract_history
    description: >
      Full contract history for a specific vendor. Source: USASpending.gov.
      Returns award totals, top agencies, contract types.

  - name: govcon_fetch_open_solicitations
    description: >
      Open bid opportunities matching a keyword. Sources: SAM.gov + EU TED + UK Find-a-Tender.
      Returns due dates, set-aside types, agencies.

  # ── T19 — Regulatory ────────────────────────────────────────────────────────
  - name: regulatory_search_open_rulemakings
    description: >
      Open rulemakings and public comment periods. Source: Regulations.gov + Federal Register.
      Returns docket title, agency, comment deadline.

  - name: regulatory_fetch_docket_details
    description: >
      Full docket details by ID. Source: Regulations.gov.
      Returns documents, comments, summary, agency contact.

  - name: regulatory_fetch_federal_register_notices
    description: >
      Recent Federal Register notices by agency. Source: Federal Register API.
      Returns type, publication date, abstract.

  # ── Shared utilities ────────────────────────────────────────────────────────
  - name: report_feedback
    description: >
      Report an incorrect, incomplete, or stale tool result.
      Always returns {status: 'recorded'}.

  - name: report_mcpize_link
    description: >
      Check subscription status and retrieve upgrade URL if required.

  - name: validate_tool_output
    description: >
      Validate any DataNexus tool response for data quality anomalies.
      Two-layer validation: deterministic rules plus Haiku AI review.
      Auto-files feedback on confirmed issues.

  # ── Sprint 8A — API Key Management ─────────────────────────────────────────
  - name: apikeys_generate_api_key
    description: >
      Generate a free DataNexus API key (dnx_...) tied to your email.
      Registered users get 100 calls/week instead of 10.
      Pass the key as X-Api-Key header on future requests.
      Rate limit: 3 keys per IP per 24 hours. No auth required.

  - name: apikeys_rotate_api_key
    description: >
      Revoke current key, issue a new one atomically.
      Returns new key once — store immediately.

  - name: apikeys_revoke_api_key
    description: >
      Permanently revoke a DataNexus API key and purge from Redis cache.

  # ── Sprint 8B — Backend Security Depth ──────────────────────────────────────
  - name: security_audit_sbom_license_policy
    description: >
      Audit a CycloneDX or SPDX SBOM against a licence policy.
      Returns PASS/WARN/BLOCK per package. Default: block GPL-3.0/AGPL-3.0.
      Custom policy via policy dict (exact SPDX IDs, no globs).
      Unlisted licences default to WARN. 500 KB limit.
      Source: deps.dev (Google).

  - name: security_fetch_cve_watch_status
    description: >
      Polling inbox for active CVE watches. Returns only watches with new events
      since last poll using a per-user cursor (per API key or anonymous).
      First call: events from last 30 days. Subsequent calls: new events only.
      Instant — reads existing Redis watch data, no external API calls.

  # ── Sprint 8B — Frontend Security (T20) ─────────────────────────────────────
  - name: frontend_security_detect_typosquatting
    description: >
      Typosquatting detection for top-500 frontend packages (React, Vite, Axios, etc.).
      Fewer false positives than full-npm scan — frontend-scoped corpus.
      Uses Damerau-Levenshtein ≤ 2. Returns risk_level LOW/MEDIUM/HIGH.

  - name: frontend_security_audit_manifest
    description: >
      Audit package.json for supply-chain risk. SHIP/CAUTION/BLOCK verdict.
      Checks CVEs in direct deps, licence compatibility, abandoned packages (>18mo).
      Optional lockfile for pinned-version accuracy. Sources: OSV.dev, deps.dev, npm.

  - name: frontend_security_audit_ci_pipeline
    description: >
      Scan GitHub Actions, Vercel, or Netlify CI configs for security issues.
      Checks: exposed literal secrets (NOT ${{ secrets.X }}), unpinned actions,
      missing npm ci / --frozen-lockfile, overly broad permissions: write-all.
      Paste config content — no filesystem access. Returns risk_level + findings.

  - name: frontend_security_fetch_package_risk_brief
    description: >
      SHIP/CAUTION/BLOCK risk brief for npm packages with frontend signals.
      Adds weekly_downloads (npm API) and is_ui_component (react-*, @mui/*, @radix-ui/*, etc.)
      on top of the standard security_fetch_package_risk_brief verdict.
      Use security_fetch_package_risk_brief for non-npm ecosystems.
