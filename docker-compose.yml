# ---------------------------------------------------------------------------
# DataNexus MCP — production stack
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f        # follow all logs
#   docker compose ps             # check service status
#
# Env file: /app/.env on the Hetzner server
# ---------------------------------------------------------------------------

services:

  # ---------- DataNexus MCP server ------------------------------------------
  datanexus-mcp:
    build: .
    restart: always
    ports:
      - "8000:8000"
      - "8101:8101"
    env_file: /app/.env
    environment:
      DATANEXUS_REDIS_URL: redis://redis:6379
      # DATANEXUS_DB_URL must NOT be set here — env_file (.env) owns it.
      # Hardcoding it here would override .env and break PG auth (user mismatch).
    depends_on:
      - redis
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Redis ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- PostgreSQL ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: /app/.env
    volumes:
      - pg-data:/var/lib/postgresql/data

  # ---------- KEV refresh (Sprint 4) ----------------------------------------
  kev-refresh:
    build: .
    restart: always
    command: python -m datanexus.kev_refresh
    env_file: /app/.env
    environment:
      DATANEXUS_REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  # ---------- Daily digest (Sprint 5) ----------------------------------------
  daily-digest:
    build: .
    restart: always
    command: python -m datanexus.jobs.daily_digest
    env_file: /app/.env
    environment:
      DATANEXUS_REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  # ---------- Caddy (TLS termination) ---------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  redis-data:
  pg-data:
  caddy-data:
